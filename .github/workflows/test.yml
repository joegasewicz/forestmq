name: Zig Tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  zig-test:
    name: zig-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run tests
        run: zig build test